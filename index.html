<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ブレーカーチェック</title>
</head>
<body>

<div class="check-group">
  <label><input type="checkbox" value="5年以上使ってる">5年以上使ってる</label>
  <label><input type="checkbox" value="落ちたことがある">落ちたことがある</label>
  <label><input type="checkbox" value="居抜き">居抜き</label>
  <label><input type="checkbox" value="電気代高い">電気代高い</label>
</div>

<label><input type="radio" name="breakerType" value="電灯のみ（100V）">100V</label>
<label><input type="radio" name="breakerType" value="動力あり（200V）">200V</label>

<input type="tel" id="phone" placeholder="電話番号">
<input type="text" id="store" placeholder="店名">

<button onclick="sendData()">送信</button>

<script>
async function sendData() {

  const phone = document.getElementById("phone").value.trim();
  const store = document.getElementById("store").value.trim();

  const breakerTypeEl =
    document.querySelector('input[name="breakerType"]:checked');

  const breakerType =
    breakerTypeEl ? breakerTypeEl.value : "";

  const frontChecks =
    [...document.querySelectorAll('.check-group input:checked')]
      .map(el => el.value);

  // ★確認用
  alert(frontChecks);

  await fetch(
    "https://plain-wind-57e1.neocorporation-murakami.workers.dev/",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        phone,
        store,
        breakerType,
        frontChecks
      })
    }
  );
}
</script>

</body>
</html>
